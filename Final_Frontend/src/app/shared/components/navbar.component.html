<nav class="sticky top-0 z-50 bg-white border-b border-slate-100 shadow-sm">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-16">

      <!-- Logo -->
      <a routerLink="/" class="flex items-center gap-2 group">
        <div class="w-8 h-8 rounded-xl bg-brand-600 flex items-center justify-center shadow-sm group-hover:bg-brand-700 transition-colors">
          <svg class="w-4 h-4 text-white" fill="currentColor" viewBox="0 0 20 20">
            <path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"/>
          </svg>
        </div>
        <span class="font-display font-semibold text-xl text-slate-900">Chill<span class="text-brand-600">-In</span></span>
      </a>

      <!-- Desktop nav -->
      <div class="hidden md:flex items-center gap-8">
        <a routerLink="/hotels" routerLinkActive="text-brand-600" class="nav-link">Hotels</a>
        <ng-container *ngIf="auth.isLoggedIn">
          <a routerLink="/booking" routerLinkActive="text-brand-600" class="nav-link">My Bookings</a>
          <a *ngIf="auth.isAdmin" routerLink="/admin/dashboard" routerLinkActive="text-brand-600" class="nav-link">Dashboard</a>
          <a *ngIf="auth.isAdmin" routerLink="/admin/hotels" routerLinkActive="text-brand-600" class="nav-link">Manage</a>
        </ng-container>
      </div>

      <!-- Right side -->
      <div class="hidden md:flex items-center gap-3">
        <ng-container *ngIf="!auth.isLoggedIn">
          <a routerLink="/login" class="btn-secondary text-sm py-2 px-4">Sign In</a>
          <a routerLink="/register" class="btn-primary text-sm py-2 px-4">Join Free</a>
        </ng-container>
        <ng-container *ngIf="auth.isLoggedIn">
          <div class="flex items-center gap-3">
            <div class="flex items-center gap-2 bg-slate-50 rounded-xl px-3 py-1.5 border border-slate-200">
              <div class="w-7 h-7 rounded-full bg-brand-600 flex items-center justify-center text-white text-xs font-semibold">
                {{ auth.currentUser?.name?.charAt(0)?.toUpperCase() }}
              </div>
              <span class="text-sm font-medium text-slate-700">{{ firstName }}</span>
              <span *ngIf="auth.isAdmin" class="badge-info">Admin</span>
            </div>
            <button (click)="logout()" class="btn-secondary text-sm py-2 px-4">Sign Out</button>
          </div>
        </ng-container>
      </div>

      <!-- Mobile hamburger -->
      <button (click)="menuOpen = !menuOpen" class="md:hidden p-2 rounded-lg text-slate-500 hover:text-brand-600">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path *ngIf="!menuOpen" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
          <path *ngIf="menuOpen" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Mobile menu -->
  <div *ngIf="menuOpen" class="md:hidden border-t border-slate-100 bg-white px-4 py-3 space-y-2 animate-fade-in">
    <a routerLink="/hotels" class="block nav-link py-2">Hotels</a>
    <ng-container *ngIf="auth.isLoggedIn">
      <a routerLink="/booking" class="block nav-link py-2">My Bookings</a>
      <a *ngIf="auth.isAdmin" routerLink="/admin/dashboard" class="block nav-link py-2">Dashboard</a>
      <a *ngIf="auth.isAdmin" routerLink="/admin/hotels" class="block nav-link py-2">Manage Hotels</a>
      <button (click)="logout()" class="block text-red-500 font-medium py-2 text-sm">Sign Out</button>
    </ng-container>
    <ng-container *ngIf="!auth.isLoggedIn">
      <a routerLink="/login" class="block nav-link py-2">Sign In</a>
      <a routerLink="/register" class="block text-brand-600 font-medium py-2 text-sm">Join Free</a>
    </ng-container>
  </div>
</nav>
