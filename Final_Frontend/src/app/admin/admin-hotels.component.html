<div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
  <!-- Header -->
  <div class="flex items-center justify-between mb-8">
    <div>
      <h1 class="section-title">Manage Hotels</h1>
      <p class="text-slate-500 text-sm mt-1">Add, edit, and remove hotels from the platform</p>
    </div>
    <button (click)="openAdd()" class="btn-primary flex items-center gap-2">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
      </svg>
      Add Hotel
    </button>
  </div>

  <!-- Messages -->
  <div *ngIf="msg" class="mb-5 p-3.5 bg-emerald-50 border border-emerald-200 rounded-xl text-sm text-emerald-700">✓ {{ msg }}</div>
  <div *ngIf="error && !showForm" class="mb-5 p-3.5 bg-red-50 border border-red-200 rounded-xl text-sm text-red-600">{{ error }}</div>

  <!-- Form Modal -->
  <div *ngIf="showForm" class="fixed inset-0 bg-black/40 backdrop-blur-sm z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg animate-slide-up">
      <div class="p-6 border-b border-slate-100">
        <h2 class="font-display text-xl font-semibold">{{ editing ? 'Edit Hotel' : 'Add New Hotel' }}</h2>
      </div>
      <div class="p-6 space-y-4">
       
        <div *ngIf="error" class="p-3 bg-red-50 border border-red-200 rounded-xl text-sm text-red-600">{{ error }}</div>
         <!-- <div>
          <label class="label">Hotel Id *</label>
          <input disabled="" type="text" [(ngModel)]="form.hotelId" class="input-field" placeholder="e.g. Grand Palace Hotel"/>
        </div> -->
        <div>
          <label class="label">Hotel Name *</label>
          <input type="text" [(ngModel)]="form.name" class="input-field" placeholder="e.g. Grand Palace Hotel"/>
        </div>
        <div>
          <label class="label">Location *</label>
          <input type="text" [(ngModel)]="form.location" class="input-field" placeholder="e.g. Chennai"/>
        </div>
        <div>
          <label class="label">Description</label>
          <textarea [(ngModel)]="form.description" rows="3" class="input-field resize-none" placeholder="Brief description..."></textarea>
        </div>
      </div>
      <div class="p-6 border-t border-slate-100 flex justify-end gap-3">
        <button (click)="cancel()" class="btn-secondary">Cancel</button>
        <button (click)="save()" class="btn-primary">{{ editing ? 'Update' : 'Add Hotel' }}</button>
      </div>
    </div>
  </div>

  <!-- Loading -->
  <div *ngIf="loading" class="space-y-3">
    <div *ngFor="let i of [1,2,3]" class="card p-5 animate-pulse flex gap-4">
      <div class="h-5 bg-slate-200 rounded flex-1"></div>
      <div class="h-5 bg-slate-200 rounded w-24"></div>
    </div>
  </div>

  <!-- Table -->
  <div *ngIf="!loading" class="card overflow-hidden">
    <table class="w-full text-sm">
      <thead class="bg-slate-50 border-b border-slate-200">
        <tr>
          <th class="text-left px-5 py-3.5 font-semibold text-slate-600">Hotel</th>
          <th class="text-left px-5 py-3.5 font-semibold text-slate-600">Location</th>
          <th class="text-left px-5 py-3.5 font-semibold text-slate-600 hidden md:table-cell">Description</th>
          <th class="text-right px-5 py-3.5 font-semibold text-slate-600">Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let hotel of hotels" class="border-b border-slate-100 hover:bg-slate-50/50 transition-colors">
          <td class="px-5 py-4">
            <div class="font-medium text-slate-900">{{ hotel.name }}</div>
            <div class="text-xs text-slate-400">#{{ hotel.hotelId }}</div>
          </td>
          <td class="px-5 py-4">
            <span class="badge-info">{{ hotel.location }}</span>
          </td>
          <td class="px-5 py-4 text-slate-500 hidden md:table-cell max-w-xs truncate">{{ hotel.description }}</td>
          <td class="px-5 py-4 text-right">
            <div class="flex items-center justify-end gap-2">
              <button (click)="openEdit(hotel)"
                      class="text-xs border border-slate-200 hover:border-brand-400 hover:text-brand-600 px-3 py-1.5 rounded-lg transition-colors">
                Edit
              </button>
              <a [routerLink]="['/admin/rooms', hotel.hotelId]"
                 class="text-xs border border-slate-200 hover:border-sky-400 hover:text-sky-600 px-3 py-1.5 rounded-lg transition-colors">
                Rooms
              </a>
              <button (click)="delete(hotel.hotelId!)" class="btn-danger text-xs py-1.5 px-3">Delete</button>
            </div>
          </td>
        </tr>
        <tr *ngIf="hotels.length === 0">
          <td colspan="4" class="px-5 py-12 text-center text-slate-400">No hotels found</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
